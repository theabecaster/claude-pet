name: build

# Two roles:
#   - CI: builds + self-test + smoke on every PR (to main/dev) and push to dev.
#         The `build` job is the required status check for merging.
#   - Release engine: called by release.yml (workflow_call) with release=true to
#         package, sign, notarize, tag and publish a GitHub Release at a version.
# Pushes to `main` are handled by release.yml (which calls this), so `main` is not
# a push trigger here — that avoids a duplicate build on every merge.
on:
  push:
    branches: [dev]
  pull_request:
    branches: [main, dev]
  workflow_call:
    inputs:
      release:
        description: "Package, sign, notarize, tag and publish a release"
        type: boolean
        default: false
      version:
        description: "Release version X.Y.Z (no leading v); required when release=true"
        type: string
        default: ""

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    # Exposed for the `if:` gates below so signing/notarization is skipped on PRs
    # and forks (where secrets are empty) and only runs on real releases.
    env:
      MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
    steps:
      - uses: actions/checkout@v4

      - name: Build (release)
        run: swift build -c release

      - name: Interaction self-test (real NSEvents through the handlers)
        run: .build/release/ClaudePet --selftest

      - name: Smoke test (CLI paths, no GUI)
        run: |
          .build/release/ClaudePet --state running < /dev/null
          test -f "$HOME/.claude-pet/sessions/default.json"
          grep -q running "$HOME/.claude-pet/sessions/default.json"
          # per-session routing
          echo '{"session_id":"ci","cwd":"/tmp/proj"}' | .build/release/ClaudePet --state waiting
          test -f "$HOME/.claude-pet/sessions/ci.json"
          echo '{"session_id":"ci"}' | .build/release/ClaudePet --state off
          test ! -f "$HOME/.claude-pet/sessions/ci.json"
          .build/release/ClaudePet --install-hooks < /dev/null
          test -f "$HOME/.claude/settings.json"
          .build/release/ClaudePet --uninstall-hooks < /dev/null

      - name: Import Developer ID certificate
        if: ${{ inputs.release && env.MACOS_CERTIFICATE != '' }}
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          KEYCHAIN_PWD: ${{ secrets.KEYCHAIN_PWD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/app.keychain-db"
          echo "$MACOS_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
          security import "$RUNNER_TEMP/cert.p12" -P "$MACOS_CERTIFICATE_PWD" -A -t cert -f pkcs12 -k "$KEYCHAIN"
          security list-keychain -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PWD" "$KEYCHAIN" >/dev/null
          IDENT=$(security find-identity -v -p codesigning "$KEYCHAIN" | grep -o '"Developer ID Application[^"]*"' | head -1 | tr -d '"')
          echo "Using identity: $IDENT"
          echo "CODESIGN_IDENTITY=$IDENT" >> "$GITHUB_ENV"

      - name: Package app
        if: ${{ inputs.release }}
        run: bash scripts/make-app.sh "${{ inputs.version }}"

      - name: Notarize and staple
        if: ${{ inputs.release && env.MACOS_CERTIFICATE != '' }}
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          ditto -c -k --keepParent "dist/ClaudePet.app" "$RUNNER_TEMP/notarize.zip"
          xcrun notarytool submit "$RUNNER_TEMP/notarize.zip" \
            --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_APP_PASSWORD" --wait
          xcrun stapler staple "dist/ClaudePet.app"
          spctl -a -vvv -t exec "dist/ClaudePet.app"   # must now report: accepted, source=Notarized Developer ID

      - name: Zip release bundle
        if: ${{ inputs.release }}
        run: |
          cd dist
          zip -r ../ClaudePet-macos.zip "ClaudePet.app"   # app only; it self-installs/uninstalls (no gated scripts)

      - uses: actions/upload-artifact@v4
        if: ${{ inputs.release }}
        with:
          name: ClaudePet-macos
          path: ClaudePet-macos.zip

      - name: Publish release
        if: ${{ inputs.release }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          files: ClaudePet-macos.zip
          generate_release_notes: true

name: release

# Auto-cuts a release whenever main advances (PR merge or a direct push by the
# maintainer). The version is derived from Conventional Commits since the last
# tag (see scripts/next-version.sh). No release fires for docs/chore-only changes
# or when the tip commit says [skip release].
#
# Manual escape hatches:
#   - Actions tab -> "release" -> Run workflow, with an explicit version, or:
#       gh workflow run release.yml -f version=1.2.3
#   - Pushing a tag directly:  git tag v1.2.3 && git push origin v1.2.3
on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: "Force a release at this version (X.Y.Z, no leading v)"
        type: string
        required: true

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      release: ${{ steps.compute.outputs.release }}
      version: ${{ steps.compute.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history + tags for conventional-commit analysis

      - id: compute
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "release=true"            >> "$GITHUB_OUTPUT"
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ startsWith(github.ref, 'refs/tags/v') }}" = "true" ]; then
            echo "release=true"                  >> "$GITHUB_OUTPUT"
            echo "version=${GITHUB_REF_NAME#v}"  >> "$GITHUB_OUTPUT"
          else
            bash scripts/next-version.sh >> "$GITHUB_OUTPUT"
          fi

      - run: |
          echo "release=${{ steps.compute.outputs.release }}"
          echo "version=${{ steps.compute.outputs.version }}"

  release:
    needs: version
    if: ${{ needs.version.outputs.release == 'true' }}
    uses: ./.github/workflows/build.yml
    with:
      release: true
      version: ${{ needs.version.outputs.version }}
    secrets: inherit
